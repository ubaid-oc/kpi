[uwsgi]

# directory structure
chdir       = $(KPI_SRC_DIR)
logto       = $(KPI_LOGS_DIR)/uwsgi.log

# Run the application at a non-root URL path
manage-script-name = true
mount              = $(KPI_PREFIX)=$(KPI_SRC_DIR)/kobo/wsgi.py

# process related settings
master              = true
harakiri            = $(KPI_UWSGI_HARAKIRI)
worker-reload-mercy = $(KPI_UWSGI_WORKER_RELOAD_MERCY)

# monitoring
stats = :1717
memory-report = true

# 2 uWSGI workers
workers = 2

# Use HTTP socket instead of uwsgi protocol for direct access
http-socket     = 0.0.0.0:8000
buffer-size     = 32768

# Serve static files directly from uWSGI
static-map      = /static=/srv/src/kpi/staticfiles

uid             = $(UWSGI_USER)
gid             = $(UWSGI_GROUP)
die-on-term     = true

env = LC_ALL=en_US.UTF-8
enable-threads  = true
single-interpreter = true
post-buffering = true
ignore-sigpipe = true
ignore-write-errors = true
disable-write-exception = true
vacuum = true
